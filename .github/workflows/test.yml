name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # "1.25.x" floats to the newest 1.25 patch; check-latest forces a
          # lookup against the upstream Go release list instead of settling for
          # the highest patch already cached on the runner image.
          go-version: "1.25.x"
          check-latest: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -trimpath -ldflags="-s -w -X main.version=v0.3.0" -o nodexia ./cmd/nodexia
