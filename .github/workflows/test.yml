name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -trimpath -ldflags="-s -w -X main.version=v0.1.0" -o nodexia ./cmd/nodexia
